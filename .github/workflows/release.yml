name: Release

# Runs when you push a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Create a draft GitHub release ───────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Zender ${tag}`,
              body: `## What's new\n\n_Fill this in before publishing._\n\n---\n\n**Zender** — the viewer app. Download and start watching channels.\n\n**Zender Broadcaster** — the source app. Open or create a channel, add your media, hit ON AIR.`,
              draft: true,
              prerelease: false,
            });
            return data.id;
          result-encoding: string

  # ── 2. Build Tauri apps on every platform ──────────────────────────────────
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — ARM64 (Apple Silicon). Intel Macs run this via Rosetta 2.
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin

          # Linux — produces .AppImage and .deb
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''

          # Windows — produces NSIS installer (.exe) and .msi
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/broadcaster/src-tauri
            packages/viewer/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      # ── Viewer ────────────────────────────────────────────────────────────
      - name: Build Viewer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: packages/viewer
          args: ${{ matrix.args }}

      # ── Broadcaster ───────────────────────────────────────────────────────
      # The channel server is compiled to a self-contained binary (sidecar)
      # and bundled inside the installer. End users need nothing else installed.
      - name: Build channel-server sidecar
        run: node packages/channel-server/scripts/build-sidecar.mjs

      - name: Build Broadcaster
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: packages/broadcaster
          args: ${{ matrix.args }}

  # ── 3. Publish the draft once all platforms finish ─────────────────────────
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
